<!DOCTYPE html>
<html lang="en" data-theme="brutalist">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batty's Game Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;600&family=VT323&family=Press+Start+2P&family=Space+Grotesk:wght@400;500;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   BASE LAYER — shared across all themes
   ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; }
body { transition: background 0.3s, color 0.3s; }
.hidden { display: none !important; }

/* Shared rating badge — themes may override. Pico-bands keyed by data-band. */
.rating {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 10px;
  padding: 1px 5px; letter-spacing: 0.04em;
  background: #444; color: #fff; border-radius: 0;
}
.rating[data-band="hi"]  { background: #1ea84a; color: #fff; }
.rating[data-band="ok"]  { background: #b3c12c; color: #000; }
.rating[data-band="mid"] { background: #ffaa33; color: #000; }
.rating[data-band="lo"]  { background: #c41e3a; color: #fff; }
.rating[data-band="na"]  { background: #2a2a2a; color: #888; }

/* Sort chip inherits .chip styling from each theme; the layout-flat modifier hides tier head + lifts grid out. */
.tier.flat .tier-head { display: none; }
.tier.flat { margin-bottom: 0; }
.label-group {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.6;
  padding-right: 4px;
}

/* ============================================================
   THEME 1: BRUTALIST / TERMINAL
   ============================================================ */
[data-theme="brutalist"] body {
  background: #0a0a0a;
  color: #d0ffaa;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 14px;
  line-height: 1.5;
  padding: 0;
}
[data-theme="brutalist"] .wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
[data-theme="brutalist"] header { border: 2px solid #d0ffaa; padding: 20px; margin-bottom: 24px; position: relative; }
[data-theme="brutalist"] header::before {
  content: "// SYSTEM.LIBRARY.MANIFEST"; position: absolute; top: -12px; left: 16px;
  background: #0a0a0a; padding: 0 10px; font-size: 11px; letter-spacing: 0.15em; color: #ffaa33;
}
[data-theme="brutalist"] h1 {
  font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700;
  letter-spacing: -0.02em; color: #ffffff; text-transform: uppercase;
}
[data-theme="brutalist"] h1::before { content: "> "; color: #ffaa33; }
[data-theme="brutalist"] h1::after { content: "_"; color: #d0ffaa; animation: blink 1s steps(1) infinite; }
@keyframes blink { 50% { opacity: 0; } }
[data-theme="brutalist"] .sub { color: #888; font-size: 12px; margin-top: 6px; letter-spacing: 0.1em; text-transform: uppercase; }
[data-theme="brutalist"] .specs { color: #ffaa33; font-size: 11px; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #444; }
[data-theme="brutalist"] .specs::before { content: "[hardware] "; color: #666; }
[data-theme="brutalist"] .stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  border: 2px solid #d0ffaa; margin-top: 16px;
}
[data-theme="brutalist"] .stat {
  border-right: 2px solid #d0ffaa; padding: 14px 18px;
}
[data-theme="brutalist"] .stat:last-child { border-right: none; }
[data-theme="brutalist"] .stat-num { font-size: 32px; font-weight: 700; color: #ffffff; line-height: 1; }
[data-theme="brutalist"] .stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.15em; margin-top: 6px; }
[data-theme="brutalist"] .stat-runs .stat-num { color: #5fff5f; }
[data-theme="brutalist"] .stat-play .stat-num { color: #ffaa33; }
[data-theme="brutalist"] .stat-skip .stat-num { color: #ff5555; }

[data-theme="brutalist"] .controls {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
  padding: 16px; border: 2px solid #d0ffaa; align-items: center;
}
[data-theme="brutalist"] .search {
  flex: 1; min-width: 220px; background: #000; border: 1px solid #d0ffaa;
  color: #d0ffaa; padding: 8px 12px; font-family: inherit; font-size: 13px;
}
[data-theme="brutalist"] .search::placeholder { color: #555; }
[data-theme="brutalist"] .search:focus { outline: none; border-color: #ffaa33; box-shadow: 0 0 0 1px #ffaa33; }
[data-theme="brutalist"] .filter-group { display: flex; gap: 0; flex-wrap: wrap; }
[data-theme="brutalist"] .chip {
  background: transparent; border: 1px solid #d0ffaa; color: #d0ffaa;
  padding: 6px 12px; font-family: inherit; font-size: 12px; cursor: pointer;
  text-transform: uppercase; letter-spacing: 0.05em;
  border-radius: 0; margin-left: -1px;
}
[data-theme="brutalist"] .chip:hover { background: #d0ffaa11; }
[data-theme="brutalist"] .chip.active { background: #d0ffaa; color: #000; }
[data-theme="brutalist"] .chip.tier-runs.active { background: #5fff5f; border-color: #5fff5f; color: #000; }
[data-theme="brutalist"] .chip.tier-play.active { background: #ffaa33; border-color: #ffaa33; color: #000; }
[data-theme="brutalist"] .chip.tier-skip.active { background: #ff5555; border-color: #ff5555; color: #000; }

[data-theme="brutalist"] .tier { margin-bottom: 32px; }
[data-theme="brutalist"] .tier-head {
  display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px;
  padding: 10px 16px; border-left: 4px solid;
}
[data-theme="brutalist"] .tier-runs .tier-head { border-left-color: #5fff5f; background: #5fff5f0a; }
[data-theme="brutalist"] .tier-play .tier-head { border-left-color: #ffaa33; background: #ffaa330a; }
[data-theme="brutalist"] .tier-skip .tier-head { border-left-color: #ff5555; background: #ff55550a; }
[data-theme="brutalist"] .tier-head h2 { font-family: inherit; font-size: 16px; font-weight: 700; text-transform: uppercase; color: #fff; letter-spacing: 0.05em; }
[data-theme="brutalist"] .tier-head h2::before { content: "## "; color: #666; }
[data-theme="brutalist"] .tier-head .desc { color: #888; font-size: 12px; flex: 1; }
[data-theme="brutalist"] .tier-head .count { color: #ffaa33; font-size: 12px; }
[data-theme="brutalist"] .tier-head .count::before { content: "["; }
[data-theme="brutalist"] .tier-head .count::after { content: " items]"; }

[data-theme="brutalist"] .grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1px;
  background: #d0ffaa; border: 2px solid #d0ffaa;
}
[data-theme="brutalist"] .card {
  background: #0a0a0a; padding: 0; display: flex; flex-direction: column;
  position: relative; border-radius: 0;
}
[data-theme="brutalist"] .card:hover { background: #1a1a1a; }
[data-theme="brutalist"] .cover {
  aspect-ratio: 460/215; background: #000 center/cover no-repeat;
  filter: contrast(1.1) saturate(0.7);
  border-bottom: 1px solid #d0ffaa;
}
[data-theme="brutalist"] .cover.no-img {
  display: flex; align-items: center; justify-content: center;
  background: repeating-linear-gradient(45deg, #0a0a0a, #0a0a0a 10px, #1a1a1a 10px, #1a1a1a 11px);
}
[data-theme="brutalist"] .cover.no-img::after {
  content: attr(data-letter); font-family: inherit; font-size: 48px; font-weight: 700; color: #d0ffaa;
}
[data-theme="brutalist"] .card-body { padding: 8px 10px 10px; gap: 4px; display: flex; flex-direction: column; flex: 1; }
[data-theme="brutalist"] .name {
  font-size: 12px; font-weight: 500; color: #fff; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
[data-theme="brutalist"] .meta { display: flex; gap: 4px; flex-wrap: wrap; margin-top: auto; }
[data-theme="brutalist"] .src { font-size: 9px; padding: 1px 5px; font-family: inherit; font-weight: 700; letter-spacing: 0.05em; }
[data-theme="brutalist"] .src-steam { background: #66c0f4; color: #000; }
[data-theme="brutalist"] .src-epic { background: #fff; color: #000; }
[data-theme="brutalist"] .src-gog { background: #b478e8; color: #000; }
[data-theme="brutalist"] .src-gamepass { background: #5fff5f; color: #000; }
[data-theme="brutalist"] .note { font-size: 10.5px; color: #888; line-height: 1.4; padding-top: 4px; border-top: 1px dashed #333; }
[data-theme="brutalist"] .badge-tier { display: none; }
[data-theme="brutalist"] .card::before {
  content: ""; position: absolute; top: 0; right: 0; width: 0; height: 0; z-index: 2;
  border-style: solid; border-width: 0 16px 16px 0;
}
[data-theme="brutalist"] .card[data-tier="runs"]::before { border-color: transparent #5fff5f transparent transparent; }
[data-theme="brutalist"] .card[data-tier="play"]::before { border-color: transparent #ffaa33 transparent transparent; }
[data-theme="brutalist"] .card[data-tier="skip"]::before { border-color: transparent #ff5555 transparent transparent; }

[data-theme="brutalist"] footer {
  margin-top: 48px; padding: 16px; border: 1px dashed #444;
  color: #666; font-size: 11px; text-align: center; text-transform: uppercase; letter-spacing: 0.1em;
}

/* ============================================================
   THEME 2: MAGAZINE / EDITORIAL
   ============================================================ */
[data-theme="magazine"] body {
  background: #f4f1ea;
  color: #1a1815;
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
}
[data-theme="magazine"] .wrap { max-width: 1280px; margin: 0 auto; padding: 48px 32px 80px; }
[data-theme="magazine"] header {
  border-bottom: 3px double #1a1815; padding-bottom: 32px; margin-bottom: 40px;
  position: relative;
}
[data-theme="magazine"] header::before {
  content: "VOL. I — ISSUE 01"; position: absolute; top: 0; right: 0;
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 13px; letter-spacing: 0.2em; color: #8b6f47;
}
[data-theme="magazine"] h1 {
  font-family: 'Playfair Display', Georgia, serif; font-size: 64px; font-weight: 900;
  letter-spacing: -0.03em; line-height: 0.95; color: #1a1815;
  margin-top: 24px;
}
[data-theme="magazine"] .sub {
  font-family: 'Playfair Display', serif; font-style: italic; font-size: 20px;
  color: #8b6f47; margin-top: 12px; font-weight: 400;
}
[data-theme="magazine"] .specs {
  margin-top: 20px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em; color: #6b5d4a; text-transform: uppercase;
}
[data-theme="magazine"] .stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  margin-top: 32px; border-top: 1px solid #1a1815; border-bottom: 1px solid #1a1815;
}
[data-theme="magazine"] .stat { padding: 20px; border-right: 1px solid #1a1815; }
[data-theme="magazine"] .stat:last-child { border-right: none; }
[data-theme="magazine"] .stat-num {
  font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 900;
  color: #1a1815; line-height: 1;
}
[data-theme="magazine"] .stat-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.2em; color: #8b6f47; margin-top: 8px;
}
[data-theme="magazine"] .stat-runs .stat-num { color: #2d5a3f; }
[data-theme="magazine"] .stat-play .stat-num { color: #a86b1f; }
[data-theme="magazine"] .stat-skip .stat-num { color: #8b2926; }

[data-theme="magazine"] .controls {
  display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 40px;
  padding: 20px 0; border-top: 1px solid #d4ccba; border-bottom: 1px solid #d4ccba;
  align-items: center;
}
[data-theme="magazine"] .search {
  flex: 1; min-width: 240px; background: transparent; border: none;
  border-bottom: 1px solid #1a1815; color: #1a1815; padding: 8px 4px;
  font-family: 'Playfair Display', serif; font-style: italic; font-size: 18px;
}
[data-theme="magazine"] .search::placeholder { color: #b5a890; }
[data-theme="magazine"] .search:focus { outline: none; border-bottom-color: #8b2926; border-bottom-width: 2px; }
[data-theme="magazine"] .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
[data-theme="magazine"] .chip {
  background: transparent; border: 1px solid #1a1815; color: #1a1815;
  padding: 6px 14px; border-radius: 999px; font-size: 12px; cursor: pointer;
  font-family: inherit; font-weight: 500;
  transition: background 0.15s;
}
[data-theme="magazine"] .chip:hover { background: #1a181510; }
[data-theme="magazine"] .chip.active { background: #1a1815; color: #f4f1ea; }

[data-theme="magazine"] .tier { margin-bottom: 64px; }
[data-theme="magazine"] .tier-head {
  display: flex; align-items: baseline; gap: 20px; margin-bottom: 32px;
  padding-bottom: 12px; border-bottom: 1px solid #1a1815;
}
[data-theme="magazine"] .tier-head h2 {
  font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900;
  color: #1a1815; letter-spacing: -0.02em; line-height: 1;
}
[data-theme="magazine"] .tier-head h2::before {
  display: inline-block; width: 14px; height: 14px; border-radius: 50%;
  margin-right: 14px; vertical-align: middle; content: "";
}
[data-theme="magazine"] .tier-runs .tier-head h2::before { background: #2d5a3f; }
[data-theme="magazine"] .tier-play .tier-head h2::before { background: #a86b1f; }
[data-theme="magazine"] .tier-skip .tier-head h2::before { background: #8b2926; }
[data-theme="magazine"] .tier-head .desc {
  font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px;
  color: #6b5d4a; flex: 1;
}
[data-theme="magazine"] .tier-head .count {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  color: #8b6f47; font-variant-numeric: tabular-nums;
}

[data-theme="magazine"] .grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px;
}
[data-theme="magazine"] .card {
  background: transparent; border-radius: 0; overflow: visible;
  display: flex; flex-direction: column; position: relative;
}
[data-theme="magazine"] .cover {
  aspect-ratio: 460/215; background: #d4ccba center/cover no-repeat;
  border-bottom: 2px solid #1a1815;
  filter: grayscale(0.15) contrast(1.05);
}
[data-theme="magazine"] .card:hover .cover { filter: grayscale(0) contrast(1.1); }
[data-theme="magazine"] .cover.no-img {
  display: flex; align-items: center; justify-content: center;
  background: #e8dfc8;
}
[data-theme="magazine"] .cover.no-img::after {
  content: attr(data-letter); font-family: 'Playfair Display', serif;
  font-size: 72px; font-style: italic; font-weight: 900; color: #8b6f47;
}
[data-theme="magazine"] .card-body { padding: 12px 0 0; gap: 6px; display: flex; flex-direction: column; flex: 1; }
[data-theme="magazine"] .name {
  font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700;
  line-height: 1.2; color: #1a1815;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
[data-theme="magazine"] .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
[data-theme="magazine"] .src {
  font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 2px 6px;
  text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
  border: 1px solid #1a1815; color: #1a1815; background: transparent;
}
[data-theme="magazine"] .note {
  font-family: 'Playfair Display', serif; font-style: italic; font-size: 13px;
  color: #6b5d4a; line-height: 1.4; margin-top: 4px;
}
[data-theme="magazine"] .badge-tier { display: none; }
[data-theme="magazine"] footer {
  margin-top: 64px; padding-top: 24px; border-top: 3px double #1a1815;
  color: #8b6f47; font-size: 12px; text-align: center;
  font-family: 'Playfair Display', serif; font-style: italic;
}

/* ============================================================
   THEME 3: TRADING CARD / COLLECTION
   ============================================================ */
[data-theme="cards"] body {
  background: #1a1530;
  background-image:
    radial-gradient(circle at 20% 10%, #4a2870 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, #2a4a70 0%, transparent 40%),
    linear-gradient(180deg, #1a1530 0%, #0f0a20 100%);
  background-attachment: fixed;
  color: #f0e8ff;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; line-height: 1.5;
}
[data-theme="cards"] .wrap { max-width: 1400px; margin: 0 auto; padding: 32px 24px 64px; }
[data-theme="cards"] header { padding-bottom: 24px; margin-bottom: 32px; }
[data-theme="cards"] h1 {
  font-family: 'Space Grotesk', sans-serif; font-size: 38px; font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #ffd700 0%, #ff6ec4 50%, #7873f5 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
[data-theme="cards"] .sub { color: #b8a8d8; font-size: 14px; margin-top: 4px; }
[data-theme="cards"] .specs { color: #7d6da8; font-size: 12px; margin-top: 12px; font-family: 'JetBrains Mono', monospace; }
[data-theme="cards"] .stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-top: 20px;
}
[data-theme="cards"] .stat {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 14px 18px; backdrop-filter: blur(10px);
}
[data-theme="cards"] .stat-num { font-size: 28px; font-weight: 700; }
[data-theme="cards"] .stat-label { font-size: 11px; color: #b8a8d8; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
[data-theme="cards"] .stat-runs .stat-num { color: #6ee7b7; }
[data-theme="cards"] .stat-play .stat-num { color: #fbbf24; }
[data-theme="cards"] .stat-skip .stat-num { color: #f87171; }

[data-theme="cards"] .controls {
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  margin-bottom: 32px; padding: 16px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; backdrop-filter: blur(10px);
}
[data-theme="cards"] .search {
  flex: 1; min-width: 220px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
  color: #f0e8ff; padding: 10px 14px; border-radius: 10px; font-size: 14px; font-family: inherit;
}
[data-theme="cards"] .search:focus { outline: none; border-color: #ff6ec4; }
[data-theme="cards"] .search::placeholder { color: #6b5d8c; }
[data-theme="cards"] .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
[data-theme="cards"] .chip {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
  color: #d8c8f0; padding: 8px 14px; border-radius: 999px; font-size: 13px;
  cursor: pointer; font-family: inherit; font-weight: 500;
}
[data-theme="cards"] .chip:hover { background: rgba(255,255,255,0.1); }
[data-theme="cards"] .chip.active {
  background: linear-gradient(135deg, #ff6ec4, #7873f5);
  border-color: transparent; color: #fff;
}

[data-theme="cards"] .tier { margin-bottom: 48px; }
[data-theme="cards"] .tier-head { display: flex; align-items: baseline; gap: 16px; margin-bottom: 20px; padding: 0 4px; }
[data-theme="cards"] .tier-head h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
[data-theme="cards"] .tier-runs .tier-head h2 { color: #6ee7b7; }
[data-theme="cards"] .tier-play .tier-head h2 { color: #fbbf24; }
[data-theme="cards"] .tier-skip .tier-head h2 { color: #f87171; }
[data-theme="cards"] .tier-head .desc { color: #b8a8d8; font-size: 13px; flex: 1; }
[data-theme="cards"] .tier-head .count {
  background: rgba(255,255,255,0.08); padding: 4px 12px; border-radius: 999px;
  font-size: 12px; font-family: 'JetBrains Mono', monospace; color: #d8c8f0;
}

[data-theme="cards"] .grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 18px;
}
[data-theme="cards"] .card {
  background: linear-gradient(160deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  border: 1.5px solid rgba(255,255,255,0.15); border-radius: 14px;
  overflow: hidden; padding: 8px; display: flex; flex-direction: column; gap: 8px;
  position: relative; transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  backdrop-filter: blur(8px);
}
[data-theme="cards"] .card:hover {
  transform: translateY(-4px) rotateX(2deg);
  box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.3);
}
[data-theme="cards"] .card[data-tier="runs"] {
  border-color: rgba(110, 231, 183, 0.4);
  background: linear-gradient(160deg, rgba(110,231,183,0.1), rgba(255,255,255,0.02));
}
[data-theme="cards"] .card[data-tier="runs"]:hover {
  box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 24px rgba(110, 231, 183, 0.3);
}

[data-theme="zine"] .badge-tier.skip { background: #c41e3a; color: #fff; }
[data-theme="zine"] .badge-tier::before { content: attr(data-letter); }
[data-theme="zine"] footer {
  margin-top: 48px; padding: 16px; text-align: center;
  font-family: 'Caveat', cursive; font-size: 18px; color: #555;
}

/* ============================================================
   THEME SWITCHER (always visible)
   ============================================================ */
.theme-switcher {
  position: fixed; top: 12px; right: 12px; z-index: 9999;
  display: flex; gap: 4px; padding: 6px;
  background: rgba(0,0,0,0.85); border-radius: 8px; backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.15);
  font-family: 'JetBrains Mono', monospace;
}
.theme-switcher button {
  background: transparent; border: 1px solid rgba(255,255,255,0.15);
  color: #ddd; padding: 6px 10px; font-size: 11px;
  cursor: pointer; border-radius: 5px;
  font-family: inherit; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;
  transition: all 0.15s;
}
.theme-switcher button:hover { background: rgba(255,255,255,0.08); color: #fff; }
.theme-switcher button.active { background: #fff; color: #000; border-color: #fff; }
.theme-switcher .label {
  color: #888; font-size: 10px; padding: 6px 8px 6px 4px;
  text-transform: uppercase; letter-spacing: 0.1em;
}
@media (max-width: 720px) {
  .theme-switcher { top: auto; bottom: 12px; right: 12px; left: 12px; justify-content: center; }
  .theme-switcher .label { display: none; }
}

/* Search highlight (shared) */
.empty-tier { padding: 24px; text-align: center; color: #888; font-style: italic; opacity: 0.6; }

@media (max-width: 640px) {
  [data-theme="brutalist"] .stats, [data-theme="magazine"] .stats { grid-template-columns: repeat(2, 1fr); }
  [data-theme="magazine"] h1 { font-size: 44px; }
  [data-theme="brutalist"] h1 { font-size: 22px; }
  [data-theme="y2k"] h1 { font-size: 18px; }
}
</style>
</head>
<body>
<div class="theme-switcher">
  <span class="label">Theme</span>
  <button data-theme-btn="brutalist" class="active">Terminal</button>
  <button data-theme-btn="magazine">Editorial</button>
  <button data-theme-btn="cards">Collection</button>
  <button data-theme-btn="y2k">Y2K</button>
  <button data-theme-btn="zine">Zine</button>
</div>

<div class="wrap">
  <header>
    <h1>Batty's Game Library</h1>
    <div class="sub">Steam · GOG · Epic · PC Game Pass</div>
    <div class="specs">Ryzen 5 7535U · Radeon 660M iGPU · 16 GB RAM</div>
    <div class="stats">
      <div class="stat stat-runs"><div class="stat-num" id="ct-runs">0</div><div class="stat-label">Runs Great</div></div>
      <div class="stat stat-play"><div class="stat-num" id="ct-play">0</div><div class="stat-label">Playable</div></div>
      <div class="stat stat-skip"><div class="stat-num" id="ct-skip">0</div><div class="stat-label">Skip</div></div>
      <div class="stat"><div class="stat-num" id="ct-total">0</div><div class="stat-label">Total</div></div>
    </div>
  </header>

  <div class="controls">
    <input type="text" class="search" id="search" placeholder="Search games…" autocomplete="off">
    <div class="filter-group" id="src-filters">
      <span class="label-group">Source</span>
      <button class="chip active" data-src="all">All</button>
      <button class="chip" data-src="steam">Steam</button>
      <button class="chip" data-src="gog">GOG</button>
      <button class="chip" data-src="epic">Epic</button>
      <button class="chip" data-src="gamepass">Game Pass</button>
    </div>
    <div class="filter-group" id="tier-filters">
      <span class="label-group">Tier</span>
      <button class="chip tier-runs active" data-tier="all">All</button>
      <button class="chip tier-runs" data-tier="runs">Runs great</button>
      <button class="chip tier-play" data-tier="play">Playable</button>
      <button class="chip tier-skip" data-tier="skip">Skip</button>
    </div>
    <div class="filter-group" id="rating-filters">
      <span class="label-group">Rating</span>
      <button class="chip active" data-rating="all">Any</button>
      <button class="chip" data-rating="hi">90%+</button>
      <button class="chip" data-rating="ok">80–89%</button>
      <button class="chip" data-rating="mid">70–79%</button>
      <button class="chip" data-rating="lo">&lt;70%</button>
      <button class="chip" data-rating="na">No score</button>
    </div>
    <div class="filter-group" id="genre-filters">
      <span class="label-group">Genre</span>
      <button class="chip active" data-genre="all">All</button>
      <!-- genre chips populated at runtime -->
    </div>
    <div class="filter-group" id="sort-filters">
      <span class="label-group">Sort</span>
      <button class="chip active" data-sort="tier">Tier</button>
      <button class="chip" data-sort="name-asc">Name A→Z</button>
      <button class="chip" data-sort="name-desc">Name Z→A</button>
      <button class="chip" data-sort="rating-desc">Rating ↓</button>
      <button class="chip" data-sort="shuffle">Shuffle</button>
    </div>
  </div>

  <main id="main"></main>

  <footer>Cover art served from Steam CDN · Categorization tuned for Radeon 660M iGPU at 1080p</footer>
</div>

<script src="games.js"></script>
<script>
// Game data is defined in games.js (window.GAMES). Run `node scripts/enrich-games.js` to refresh genres/ratings.
const games = window.GAMES;


const sourceLabels = { steam: "Steam", gog: "GOG", epic: "Epic", gamepass: "Game Pass" };
const tierData = {
  runs: { title: "Runs Great", desc: "Plays smoothly at 1080p — your laptop will handle these without breaking a sweat.", letter: "A" },
  play: { title: "Playable", desc: "Will run with compromises — usually 720p, low settings, or 30fps target. Worth trying.", letter: "B" },
  skip: { title: "Skip On This Machine", desc: "Either too demanding for the 660M iGPU, requires VR, or has serious performance problems.", letter: "F" }
};

function makeCover(g) {
  if (g.appid) return `https://cdn.cloudflare.steamstatic.com/steam/apps/${g.appid}/header.jpg`;
  return null;
}

function ratingBand(r) {
  if (r == null || isNaN(r)) return 'na';
  if (r >= 90) return 'hi';
  if (r >= 80) return 'ok';
  if (r >= 70) return 'mid';
  return 'lo';
}

function renderCard(g) {
  const cover = makeCover(g);
  const letter = g.name.replace(/^(The|A|An) /, '').charAt(0).toUpperCase();
  const tierLetter = tierData[g.tier].letter;
  const coverHtml = cover
    ? `<div class="cover" style="background-image:url('${cover}')"></div>`
    : `<div class="cover no-img" data-letter="${letter}"></div>`;
  const sourceBadges = g.sources.map(s => `<span class="src src-${s}">${sourceLabels[s]}</span>`).join('');
  const band = ratingBand(g.rating);
  const ratingTitle = g.reviewDesc ? `${g.reviewDesc}${g.rating != null ? ` · ${Math.round(g.rating)}%` : ''}` : '';
  const ratingHtml = g.rating != null
    ? `<span class="rating" data-band="${band}" title="${ratingTitle}">${Math.round(g.rating)}%</span>`
    : '';
  const note = g.note ? `<div class="note">${g.note}</div>` : '';
  const genres = (g.genres || []).map(s => s.toLowerCase()).join('|');
  return `
    <div class="card" data-tier="${g.tier}" data-sources="${g.sources.join(',')}" data-name="${g.name.toLowerCase()}" data-genres="${genres}" data-rating-band="${band}">
      <div class="badge-tier ${g.tier}" data-letter="${tierLetter}"></div>
      ${coverHtml}
      <div class="card-body">
        <div class="name">${g.name}</div>
        <div class="meta">${sourceBadges}${ratingHtml}</div>
        ${note}
      </div>
    </div>
  `;
}

const TIERS = ['runs', 'play', 'skip'];
const SORTERS = {
  'tier':         (a, b) => a.name.localeCompare(b.name),
  'name-asc':     (a, b) => a.name.localeCompare(b.name),
  'name-desc':    (a, b) => b.name.localeCompare(a.name),
  'rating-desc':  (a, b) => (b.rating ?? -1) - (a.rating ?? -1) || a.name.localeCompare(b.name),
  'shuffle':      () => Math.random() - 0.5,
};

function render() {
  const main = document.getElementById('main');
  let html = '';
  if (activeSort === 'tier') {
    for (const t of TIERS) {
      const tierGames = games.filter(g => g.tier === t).sort(SORTERS['name-asc']);
      html += `
        <section class="tier tier-${t}" data-tier-section="${t}">
          <div class="tier-head">
            <h2>${tierData[t].title}</h2>
            <span class="desc">${tierData[t].desc}</span>
            <span class="count" data-count="${t}">${tierGames.length}</span>
          </div>
          <div class="grid">${tierGames.map(renderCard).join('')}</div>
        </section>
      `;
    }
  } else {
    const sorted = [...games].sort(SORTERS[activeSort]);
    html += `
      <section class="tier flat" data-tier-section="flat">
        <div class="grid">${sorted.map(renderCard).join('')}</div>
      </section>
    `;
  }
  main.innerHTML = html;

  document.getElementById('ct-runs').textContent = games.filter(g => g.tier === 'runs').length;
  document.getElementById('ct-play').textContent = games.filter(g => g.tier === 'play').length;
  document.getElementById('ct-skip').textContent = games.filter(g => g.tier === 'skip').length;
  document.getElementById('ct-total').textContent = games.length;

  // Image fallback
  document.querySelectorAll('.cover[style*="background-image"]').forEach(el => {
    const img = new Image();
    const url = el.style.backgroundImage.slice(5, -2);
    img.onerror = () => {
      el.style.backgroundImage = '';
      el.classList.add('no-img');
      const card = el.closest('.card');
      const name = card.querySelector('.name').textContent;
      const letter = name.replace(/^(The|A|An) /, '').charAt(0).toUpperCase();
      el.setAttribute('data-letter', letter);
    };
    img.src = url;
  });
}

let activeSrc = 'all';
let activeTier = 'all';
let activeRating = 'all';
let activeGenres = new Set();   // empty = all
let activeSort = 'tier';
let searchQuery = '';

try {
  const savedSort = localStorage.getItem('batty-games-sort');
  if (savedSort && (savedSort === 'tier' || SORTERS[savedSort])) activeSort = savedSort;
} catch(e) {}

function buildGenreChips() {
  const seen = new Set();
  for (const g of games) (g.genres || []).forEach(x => seen.add(x));
  const all = Array.from(seen).sort((a, b) => a.localeCompare(b));
  const wrap = document.getElementById('genre-filters');
  // wipe existing chips except the "All" chip and label
  wrap.querySelectorAll('.chip:not([data-genre="all"])').forEach(c => c.remove());
  for (const name of all) {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.genre = name.toLowerCase();
    btn.textContent = name;
    wrap.appendChild(btn);
  }
}

function applyFilters() {
  const cards = document.querySelectorAll('.card');
  const visibleByTier = { runs: 0, play: 0, skip: 0 };
  cards.forEach(card => {
    const tier = card.dataset.tier;
    const sources = card.dataset.sources.split(',');
    const cardGenres = card.dataset.genres ? card.dataset.genres.split('|') : [];
    const band = card.dataset.ratingBand;
    const name = card.dataset.name;
    const matchesSrc = activeSrc === 'all' || sources.includes(activeSrc);
    const matchesTier = activeTier === 'all' || tier === activeTier;
    const matchesRating = activeRating === 'all' || band === activeRating;
    const matchesGenre = activeGenres.size === 0 || cardGenres.some(g => activeGenres.has(g));
    const matchesSearch = !searchQuery || name.includes(searchQuery);
    const visible = matchesSrc && matchesTier && matchesRating && matchesGenre && matchesSearch;
    card.classList.toggle('hidden', !visible);
    if (visible && tier in visibleByTier) visibleByTier[tier]++;
  });
  document.querySelectorAll('[data-tier-section]').forEach(sec => {
    const t = sec.dataset.tierSection;
    if (t === 'flat') return;
    sec.classList.toggle('hidden', visibleByTier[t] === 0);
    sec.querySelector(`[data-count="${t}"]`).textContent = visibleByTier[t];
  });
}

function wireSingleSelect(groupId, onSelect) {
  document.querySelectorAll(`#${groupId} .chip`).forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll(`#${groupId} .chip`).forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      onSelect(chip);
    });
  });
}

function wireGenreChips() {
  document.querySelectorAll('#genre-filters .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const g = chip.dataset.genre;
      if (g === 'all') {
        activeGenres.clear();
        document.querySelectorAll('#genre-filters .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      } else {
        document.querySelector('#genre-filters .chip[data-genre="all"]').classList.remove('active');
        if (activeGenres.has(g)) {
          activeGenres.delete(g);
          chip.classList.remove('active');
        } else {
          activeGenres.add(g);
          chip.classList.add('active');
        }
        if (activeGenres.size === 0) {
          document.querySelector('#genre-filters .chip[data-genre="all"]').classList.add('active');
        }
      }
      applyFilters();
    });
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  applyFilters();
});
wireSingleSelect('src-filters',    chip => { activeSrc = chip.dataset.src; applyFilters(); });
wireSingleSelect('tier-filters',   chip => { activeTier = chip.dataset.tier; applyFilters(); });
wireSingleSelect('rating-filters', chip => { activeRating = chip.dataset.rating; applyFilters(); });
wireSingleSelect('sort-filters',   chip => {
  activeSort = chip.dataset.sort;
  try { localStorage.setItem('batty-games-sort', activeSort); } catch(e) {}
  render();
  applyFilters();
});

// Reflect persisted sort in chip state
document.querySelectorAll('#sort-filters .chip').forEach(c => {
  c.classList.toggle('active', c.dataset.sort === activeSort);
});

// THEME SWITCHER
document.querySelectorAll('.theme-switcher button').forEach(btn => {
  btn.addEventListener('click', () => {
    const theme = btn.dataset.themeBtn;
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('.theme-switcher button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    try { localStorage.setItem('batty-games-theme', theme); } catch(e) {}
  });
});
// Restore
try {
  const saved = localStorage.getItem('batty-games-theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    document.querySelectorAll('.theme-switcher button').forEach(b => {
      b.classList.toggle('active', b.dataset.themeBtn === saved);
    });
  }
} catch(e) {}

buildGenreChips();
wireGenreChips();
render();
applyFilters();
</script>
</body>
</html>
