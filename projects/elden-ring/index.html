<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tarnished">
<meta name="theme-color" content="#0d0907">
<title>Path of the Tarnished</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230d0907'/%3E%3Ctext x='90' y='118' font-family='serif' font-size='100' fill='%23c9a44c' text-anchor='middle' font-weight='900'%3E✦%3C/text%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }

  :root {
    --gold: #c9a44c;
    --gold-bright: #e8c878;
    --gold-dim: #8a6f30;
    --ember: #d4663a;
    --blood: #6b1818;
    --parchment: #d9c79a;
    --ink: #1a1410;
    --ink-deep: #0d0907;
    --ash: #2a221b;
    --bone: #ede0c2;
  }

  html, body {
    background: var(--ink-deep);
    color: var(--bone);
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    line-height: 1.55;
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }

  body {
    background:
      radial-gradient(ellipse at top, rgba(201, 164, 76, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at bottom, rgba(107, 24, 24, 0.06) 0%, transparent 60%),
      linear-gradient(180deg, #0d0907 0%, #1a1410 100%);
    background-attachment: fixed;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px);
    pointer-events: none;
    z-index: 1;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 18px 80px;
    position: relative;
    z-index: 2;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 32px 0 28px;
    border-bottom: 1px solid var(--gold-dim);
    position: relative;
    margin-bottom: 8px;
  }
  header::before, header::after {
    content: '✦';
    color: var(--gold);
    font-size: 12px;
    position: absolute;
    bottom: -7px;
    background: var(--ink-deep);
    padding: 0 8px;
  }
  header::before { left: 30%; }
  header::after { right: 30%; }

  .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--gold);
    margin-bottom: 14px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(26px, 7vw, 36px);
    line-height: 1.05;
    color: var(--gold-bright);
    letter-spacing: 0.02em;
    text-shadow: 0 2px 12px rgba(201, 164, 76, 0.3);
    margin-bottom: 8px;
  }

  .subtitle {
    font-style: italic;
    font-size: 16px;
    color: var(--parchment);
    opacity: 0.75;
    max-width: 420px;
    margin: 0 auto;
  }

  /* PROGRESS */
  .progress-shell {
    margin: 24px 0 8px;
    padding: 16px;
    background: linear-gradient(180deg, rgba(201,164,76,0.08), rgba(201,164,76,0.02));
    border: 1px solid rgba(201,164,76,0.25);
    position: relative;
  }
  .progress-shell::before, .progress-shell::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    border: 1px solid var(--gold);
  }
  .progress-shell::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .progress-shell::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .progress-label span:first-child {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--gold);
  }
  .progress-label span:last-child {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--gold-bright);
    font-weight: 600;
  }

  .progress-track {
    height: 4px;
    background: rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright), var(--gold));
    transition: width 0.6s cubic-bezier(0.19, 1, 0.22, 1);
    box-shadow: 0 0 8px rgba(232, 200, 120, 0.5);
  }

  /* CURRENT STATE */
  .current-state {
    margin: 20px 0 32px;
    padding: 18px;
    background: linear-gradient(135deg, rgba(212, 102, 58, 0.12), rgba(107, 24, 24, 0.05));
    border-left: 3px solid var(--ember);
  }
  .current-state-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ember);
    margin-bottom: 8px;
  }
  .current-state-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--bone);
    margin-bottom: 6px;
  }
  .current-state-detail {
    font-size: 15px;
    color: var(--parchment);
    opacity: 0.85;
    line-height: 1.5;
  }
  .current-state-detail em {
    color: var(--gold-bright);
    font-style: normal;
    font-weight: 600;
  }

  /* PHASES */
  .phase {
    margin-bottom: 28px;
    border: 1px solid rgba(201, 164, 76, 0.18);
    background: linear-gradient(180deg, rgba(26, 20, 16, 0.6), rgba(13, 9, 7, 0.4));
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    position: relative;
    overflow: hidden;
  }

  .phase.complete { opacity: 0.55; }
  .phase.complete .phase-header::after {
    content: '◆ COMPLETE';
    position: absolute;
    top: 18px;
    right: 18px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--gold);
  }

  .phase-header {
    padding: 22px 18px 18px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
    transition: background 0.3s;
  }
  .phase-header:active { background: rgba(201, 164, 76, 0.05); }

  .phase-num {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .phase-title {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--bone);
    line-height: 1.15;
    margin-bottom: 6px;
    padding-right: 30px;
  }
  .phase-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.05em;
  }

  .phase-toggle {
    position: absolute;
    top: 22px;
    right: 18px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 14px;
    transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
  }
  .phase.open .phase-toggle { transform: rotate(180deg); }
  .phase.complete .phase-toggle { display: none; }

  .phase-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.6s cubic-bezier(0.19, 1, 0.22, 1);
  }
  .phase.open .phase-body { max-height: 12000px; }
  .phase-body-inner { padding: 4px 18px 22px; }

  /* SECTION */
  .section { margin-top: 22px; }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px dashed rgba(201, 164, 76, 0.25);
  }

  .stat-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--parchment);
    background: rgba(0,0,0,0.3);
    padding: 10px 12px;
    border-left: 2px solid var(--gold);
    line-height: 1.7;
  }
  .stat-line strong { color: var(--gold-bright); font-weight: 600; }

  /* ROUTE INTRO */
  .route-intro {
    background: rgba(201, 164, 76, 0.05);
    border: 1px dashed rgba(201, 164, 76, 0.25);
    padding: 14px 16px;
    font-size: 14px;
    color: var(--parchment);
    line-height: 1.6;
    margin-bottom: 16px;
    font-style: italic;
  }
  .route-intro strong { color: var(--gold-bright); font-style: normal; font-weight: 600; }

  /* CHECKLIST ITEMS */
  .checklist { list-style: none; }

  .check-item {
    border-bottom: 1px solid rgba(201, 164, 76, 0.1);
    transition: opacity 0.3s;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item.done { opacity: 0.4; }

  .check-head {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 4px 10px;
    cursor: pointer;
  }

  .checkbox {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border: 1.5px solid var(--gold-dim);
    background: rgba(0,0,0,0.4);
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }
  .check-item.done .checkbox {
    border-color: var(--gold);
    background: var(--gold);
  }
  .checkbox::after {
    content: '';
    width: 6px;
    height: 11px;
    border: solid var(--ink-deep);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) scale(0);
    transition: transform 0.2s;
    margin-bottom: 2px;
  }
  .check-item.done .checkbox::after { transform: rotate(45deg) scale(1); }

  .check-content { flex: 1; min-width: 0; }
  .check-name {
    font-size: 17px;
    color: var(--bone);
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 3px;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.01em;
  }
  .check-item.done .check-name { text-decoration: line-through; }

  .check-tagline {
    font-size: 13px;
    color: var(--gold);
    font-style: italic;
    opacity: 0.75;
  }

  .expand-toggle {
    flex-shrink: 0;
    color: var(--gold-dim);
    font-size: 11px;
    margin-top: 5px;
    transition: transform 0.3s;
    width: 20px;
    text-align: center;
  }
  .check-item.expanded .expand-toggle { transform: rotate(180deg); color: var(--gold); }

  .check-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.19, 1, 0.22, 1);
  }
  .check-item.expanded .check-detail { max-height: 1000px; }

  .detail-inner {
    padding: 4px 0 16px 34px;
    font-size: 14.5px;
    color: var(--parchment);
    line-height: 1.6;
  }

  .detail-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    align-items: baseline;
  }
  .detail-row:last-child { margin-bottom: 0; }
  .detail-label {
    flex-shrink: 0;
    font-family: 'Cinzel', serif;
    font-size: 9.5px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    width: 64px;
    padding-top: 2px;
  }
  .detail-value { flex: 1; }
  .detail-value em { color: var(--gold-bright); font-style: normal; font-weight: 600; }
  .detail-value strong { color: var(--bone); font-weight: 600; }

  .wiki-link {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 12px;
    background: rgba(201, 164, 76, 0.1);
    border: 1px solid rgba(201, 164, 76, 0.3);
    color: var(--gold-bright);
    text-decoration: none;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    transition: all 0.2s;
  }
  .wiki-link:active {
    background: rgba(201, 164, 76, 0.2);
    border-color: var(--gold);
  }
  .wiki-link::after { content: ' ↗'; }

  /* BOSS CARD */
  .boss-card {
    margin-top: 20px;
    background: linear-gradient(135deg, rgba(107, 24, 24, 0.15), rgba(0,0,0,0.4));
    border: 1px solid rgba(212, 102, 58, 0.35);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .boss-card.done { opacity: 0.5; filter: grayscale(0.6); }

  .boss-emblem {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, rgba(107, 24, 24, 0.4), rgba(13, 9, 7, 0.95));
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .boss-emblem::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 40%, rgba(212, 102, 58, 0.25), transparent 50%),
      radial-gradient(circle at 70% 60%, rgba(201, 164, 76, 0.15), transparent 50%);
  }
  .boss-emblem-mark {
    font-family: 'Cinzel', serif;
    font-size: 64px;
    color: var(--ember);
    opacity: 0.4;
    text-shadow: 0 0 30px rgba(212, 102, 58, 0.6);
    z-index: 1;
  }

  .boss-content { padding: 16px 16px 18px; }

  .boss-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ember);
    margin-bottom: 6px;
  }
  .boss-name {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--bone);
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .boss-targets {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    flex-wrap: wrap;
  }
  .boss-targets span {
    background: rgba(0,0,0,0.4);
    padding: 4px 8px;
    border: 1px solid rgba(201, 164, 76, 0.2);
  }
  .boss-tip {
    font-size: 14px;
    color: var(--parchment);
    line-height: 1.5;
    opacity: 0.9;
    margin-bottom: 10px;
  }
  .boss-tip em { color: var(--gold-bright); font-style: normal; font-weight: 600; }
  .boss-tip strong { color: var(--bone); }

  .boss-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .boss-defeat-btn {
    flex: 1;
    min-width: 140px;
    padding: 12px;
    background: linear-gradient(180deg, rgba(212, 102, 58, 0.2), rgba(107, 24, 24, 0.3));
    border: 1px solid rgba(212, 102, 58, 0.5);
    color: var(--bone);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .boss-defeat-btn:active {
    background: linear-gradient(180deg, rgba(212, 102, 58, 0.4), rgba(107, 24, 24, 0.5));
    transform: scale(0.98);
  }
  .boss-card.done .boss-defeat-btn {
    background: rgba(201, 164, 76, 0.15);
    border-color: var(--gold);
    color: var(--gold-bright);
  }
  .boss-card.done .boss-defeat-btn::before { content: '◆ '; }

  /* FINAL */
  .final-banner {
    margin-top: 32px;
    padding: 28px 20px;
    text-align: center;
    background: linear-gradient(135deg, rgba(201, 164, 76, 0.1), rgba(212, 102, 58, 0.08));
    border: 1px solid var(--gold);
    position: relative;
  }
  .final-banner::before, .final-banner::after {
    content: '✦';
    position: absolute;
    color: var(--gold);
    font-size: 16px;
  }
  .final-banner::before { top: -10px; left: 50%; transform: translateX(-50%); background: var(--ink-deep); padding: 0 8px; }
  .final-banner::after { bottom: -10px; left: 50%; transform: translateX(-50%); background: var(--ink-deep); padding: 0 8px; }

  .final-banner h2 {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--gold-bright);
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }
  .final-banner p {
    font-size: 15px;
    color: var(--parchment);
    font-style: italic;
    line-height: 1.5;
  }

  /* RESET */
  .reset-area { margin-top: 40px; text-align: center; }
  .reset-btn {
    background: none;
    border: 1px solid rgba(201, 164, 76, 0.2);
    color: rgba(201, 164, 76, 0.5);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:active { border-color: var(--gold); color: var(--gold); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: linear-gradient(180deg, var(--ash), var(--ink));
    border: 1px solid var(--gold);
    color: var(--gold-bright);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    padding: 14px 24px;
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
    box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 20px rgba(201,164,76,0.2);
    pointer-events: none;
    text-align: center;
    max-width: calc(100vw - 40px);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes glow {
    0%, 100% { text-shadow: 0 2px 12px rgba(201, 164, 76, 0.3); }
    50% { text-shadow: 0 2px 20px rgba(232, 200, 120, 0.6); }
  }
  h1 { animation: glow 4s ease-in-out infinite; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .phase { animation: fadeUp 0.6s ease-out backwards; }
  .phase:nth-child(1) { animation-delay: 0.1s; }
  .phase:nth-child(2) { animation-delay: 0.15s; }
  .phase:nth-child(3) { animation-delay: 0.2s; }
  .phase:nth-child(4) { animation-delay: 0.25s; }
  .phase:nth-child(5) { animation-delay: 0.3s; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="eyebrow">Elden Ring · Confessor</div>
    <h1>Path of the<br>Tarnished</h1>
    <p class="subtitle">A road of fire and faith, leading to the realm of shadow</p>
  </header>

  <div class="progress-shell">
    <div class="progress-label">
      <span>Journey</span>
      <span id="progressText">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <div class="current-state">
    <div class="current-state-label">◆ Where you stand</div>
    <div class="current-state-title" id="currentTitle">Phase 1 — Limgrave</div>
    <div class="current-state-detail" id="currentDetail">
      Starting Confessor at <em>Level 10</em>. First task: dump 5 points into Vigor, then ride out and cheese the <em>Tree Sentinel</em> for the Golden Halberd.
    </div>
  </div>

  <div id="phasesContainer"></div>

  <div class="reset-area">
    <button class="reset-btn" id="resetBtn">↺ Return to Grace</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ===== DATA =====
  const PHASES = [
    {
      id: 'p1',
      title: 'Limgrave',
      sub: 'Awakening',
      levels: 'LV 10 → 25',
      stats: 'Vigor → Endurance → Strength. Hit <strong>Vigor 15</strong> ASAP, then push toward Halberd reqs (16 STR / 14 DEX / 12 FAI already met).',
      route: 'Spawn at <strong>The First Step</strong>. Ride north to meet Melina (auto-triggers), get Torrent. Then explore in this order: Church of Elleh → Gatefront Ruins → Murkwater Cave → Stormhill Shack → Limgrave Tunnels → Tree Sentinel → push to Margit.',
      pickups: [
        {
          id: 'p1-1',
          name: 'Whetstone Knife',
          tagline: 'Unlocks Ashes of War',
          where: 'Gatefront Ruins (central Limgrave, just north of The First Step grace).',
          how: 'Ride north on the main road from The First Step. The ruins are the camp full of Godrick Soldiers right at the fork. Dodge or kill the soldiers, find the chest in the underground area beneath the ruins (drop down through the gap near a half-buried wagon).',
          gives: 'Lets you change weapon Ashes of War at any Site of Grace.',
          link: 'https://eldenring.wiki.fextralife.com/Whetstone+Knife'
        },
        {
          id: 'p1-2',
          name: 'Lone Wolf Ashes',

        location: '<strong>Mohgwyn Palace</strong>, accessed via Varré\'s questline OR the Consecrated Snowfield portal.',
        tip: '◆ <em>DLC UNLOCK BOSS #2</em> ◆ <strong>BEFORE THE FIGHT:</strong> mix <em>Purifying Crystal Tear</em> + any other tear into your Wondrous Physick at a Site of Grace. Drink it RIGHT before entering. Phase 1: use <em>Mohg\'s Shackle</em> twice to stun him. Phase 2: when he counts to 3 and curses you (Nihil), you take ZERO damage thanks to the tear. Hit him hard while he\'s recovering. Mimic Tear summon with Blasphemous Blade equipped will spam Taker\'s Flames — devastating.',
        link: 'https://eldenring.wiki.fextralife.com/Mohg%2C+Lord+of+Blood',
        mark: '☠'
      }
    }
  ];

  const STORAGE_KEY = 'elden_tracker_state_v2';

  // ===== STATE =====
  let state = {
    completed: {},
    bossesDefeated: {},
    expanded: {},
    openPhase: 'p1'
  };

  // ===== STORAGE =====
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        state = { ...state, ...parsed };
        if (!state.expanded) state.expanded = {};
      }
    } catch (e) {}
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {}
  }

  // ===== RENDER =====
  function render() {
    const container = document.getElementById('phasesContainer');
    container.innerHTML = '';

    PHASES.forEach((phase, idx) => {
      const allChecked = phase.pickups.every(p => state.completed[p.id]);
      const bossDefeated = state.bossesDefeated[phase.id];
      const phaseComplete = allChecked && bossDefeated;
      const isOpen = state.openPhase === phase.id && !phaseComplete;

      const phaseEl = document.createElement('div');
      phaseEl.className = 'phase' + (isOpen ? ' open' : '') + (phaseComplete ? ' complete' : '');

      phaseEl.innerHTML = `
        <div class="phase-header" data-phase="${phase.id}">
          <div class="phase-num">PHASE ${String(idx + 1).padStart(2, '0')} · ${phase.sub.toUpperCase()}</div>
          <div class="phase-title">${phase.title}</div>
          <div class="phase-meta">${phase.levels}</div>
          <div class="phase-toggle">▾</div>
        </div>
        <div class="phase-body">
          <div class="phase-body-inner">
            <div class="route-intro"><strong>Route:</strong> ${phase.route}</div>

            <div class="section">
              <div class="section-title">Stat Priority</div>
              <div class="stat-line">${phase.stats}</div>
            </div>

            <div class="section">
              <div class="section-title">Pickups & Setup</div>
              <ul class="checklist">
                ${phase.pickups.map(p => `
                  <li class="check-item ${state.completed[p.id] ? 'done' : ''} ${state.expanded[p.id] ? 'expanded' : ''}" data-id="${p.id}">
                    <div class="check-head">
                      <div class="checkbox" data-checkbox="${p.id}"></div>
                      <div class="check-content" data-expand="${p.id}">
                        <div class="check-name">${p.name}</div>
                        <div class="check-tagline">${p.tagline}</div>
                      </div>
                      <div class="expand-toggle" data-expand="${p.id}">▾</div>
                    </div>
                    <div class="check-detail">
                      <div class="detail-inner">
                        <div class="detail-row"><div class="detail-label">Where</div><div class="detail-value">${p.where}</div></div>
                        <div class="detail-row"><div class="detail-label">How</div><div class="detail-value">${p.how}</div></div>
                        <div class="detail-row"><div class="detail-label">Gives</div><div class="detail-value">${p.gives}</div></div>
                        <a href="${p.link}" target="_blank" rel="noopener" class="wiki-link">Open Wiki Page</a>
                      </div>
                    </div>
                  </li>
                `).join('')}
              </ul>
            </div>

            <div class="boss-card ${bossDefeated ? 'done' : ''}">
              <div class="boss-emblem">
                <div class="boss-emblem-mark">${phase.boss.mark}</div>
              </div>
              <div class="boss-content">
                <div class="boss-label">◆ MILESTONE BOSS</div>
                <div class="boss-name">${phase.boss.name}</div>
                <div class="boss-targets">
                  <span>${phase.boss.level}</span>
                  <span>${phase.boss.weapon}</span>
                </div>
                <div class="boss-tip"><strong>Where:</strong> ${phase.boss.location}</div>
                <div class="boss-tip">${phase.boss.tip}</div>
                <div class="boss-actions">
                  <a href="${phase.boss.link}" target="_blank" rel="noopener" class="wiki-link" style="flex:0; min-width:auto;">Wiki ↗</a>
                  <button class="boss-defeat-btn" data-boss="${phase.id}">
                    ${bossDefeated ? 'DEFEATED' : 'MARK DEFEATED'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
      container.appendChild(phaseEl);
    });

    const allDone = PHASES.every(p =>
      p.pickups.every(pk => state.completed[pk.id]) &&
      state.bossesDefeated[p.id]
    );

    if (allDone) {
      const banner = document.createElement('div');
      banner.className = 'final-banner';
      banner.innerHTML = `
        <h2>Touch the Withered Arm</h2>
        <p>The road is run. Step into the Realm of Shadow — and remember: <em style="color:var(--gold-bright); font-style:normal;">Scadutree Fragments matter more than levels here.</em></p>
      `;
      container.appendChild(banner);
    }

    updateProgress();
    updateCurrentState();
    attachListeners();
  }

  function updateProgress() {
    const totalItems = PHASES.reduce((sum, p) => sum + p.pickups.length + 1, 0);
    const doneItems = PHASES.reduce((sum, p) => {
      const pickups = p.pickups.filter(pk => state.completed[pk.id]).length;
      const boss = state.bossesDefeated[p.id] ? 1 : 0;
      return sum + pickups + boss;
    }, 0);
    const pct = Math.round((doneItems / totalItems) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = pct + '%';
  }

  function updateCurrentState() {
    let currentPhase = PHASES[PHASES.length - 1];
    let currentDetail = '';

    for (const p of PHASES) {
      const pickupsLeft = p.pickups.filter(pk => !state.completed[pk.id]);
      const bossLeft = !state.bossesDefeated[p.id];
      if (pickupsLeft.length > 0 || bossLeft) {
        currentPhase = p;
        if (pickupsLeft.length > 0) {
          currentDetail = `Next up: <em>${pickupsLeft[0].name}</em>. ${pickupsLeft[0].tagline}.`;
        } else if (bossLeft) {
          currentDetail = `All gear in hand. Time to face <em>${p.boss.name}</em> at <em>${p.boss.level}</em>.`;
        }
        break;
      }
    }

    const allDone = PHASES.every(p =>
      p.pickups.every(pk => state.completed[pk.id]) &&
      state.bossesDefeated[p.id]
    );

    if (allDone) {
      document.getElementById('currentTitle').textContent = 'The Shadow Awaits';
      document.getElementById('currentDetail').innerHTML = 'You have done it, Tarnished. Step through.';
    } else {
      document.getElementById('currentTitle').textContent = `Phase ${PHASES.indexOf(currentPhase) + 1} — ${currentPhase.title}`;
      document.getElementById('currentDetail').innerHTML = currentDetail;
    }
  }

  function attachListeners() {
    document.querySelectorAll('.phase-header').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.phase;
        state.openPhase = state.openPhase === id ? null : id;
        saveState();
        render();
      });
    });

    // Checkbox toggle
    document.querySelectorAll('[data-checkbox]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = el.dataset.checkbox;
        state.completed[id] = !state.completed[id];
        saveState();
        render();
      });
    });

    // Expand toggle (clicking on the name area or the chevron)
    document.querySelectorAll('[data-expand]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = el.dataset.expand;
        state.expanded[id] = !state.expanded[id];
        saveState();
        render();
      });
    });

    document.querySelectorAll('.boss-defeat-btn').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = el.dataset.boss;
        state.bossesDefeated[id] = !state.bossesDefeated[id];
        if (state.bossesDefeated[id]) {
          const phase = PHASES.find(p => p.id === id);
          showToast(`◆ ${phase.boss.name.toUpperCase()} VANQUISHED ◆`);
          const nextIdx = PHASES.indexOf(phase) + 1;
          if (nextIdx < PHASES.length) {
            state.openPhase = PHASES[nextIdx].id;
          }
        }
        saveState();
        render();
      });
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('Reset all progress? The Tarnished must begin again.')) {
      state = { completed: {}, bossesDefeated: {}, expanded: {}, openPhase: 'p1' };
      saveState();
      render();
      showToast('◆ RETURNED TO GRACE ◆');
    }
  });

  loadState();
  render();
</script>
</body>
</html>
